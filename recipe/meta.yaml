{% set name = "metatensor-operations" %}
{% set version = "0.5.0.rc2" %}
{% set upstream_version = "0.5.0rc2" %}

package:
  name: python-{{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/metatensor_operations-{{ upstream_version }}.tar.gz
  sha256: 6dda293915a74a32d44b7bfdb4de463a9861fe18e72d2c9a8f4b6767246858ca

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=75
    - packaging >=23
    - pip
  run:
    - python >={{ python_min }}
    - python-metatensor-core >=0.2.0.rc3,<0.3.0

test:
  imports:
    - metatensor
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip

about:
  home: https://github.com/metatensor/metatensor
  summary: Operations to manipulate metatensor data types
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  doc_url: https://docs.metatensor.org

extra:
  recipe-maintainers:
    - HaoZeke
    - PicoCentauri
    - Luthaf
